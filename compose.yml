services:
  postgres:
    image: postgres:16
    container_name: myapp-postgres
    restart: always
    environment:
      TZ: Asia/Singapore
      PGTZ: Asia/Singapore
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # optional locale settings:
      LANG: en_US.utf8
      LC_COLLATE: en_US.UTF-8
      LC_CTYPE: en_US.UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "127.0.0.1:5454:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - uat_net
      
  app:
    build: .
    container_name: myapp-application
    environment:
      SPRING_PROFILES_ACTIVE: docker 
      DB_URL: jdbc:postgresql://postgres:5432/myapp
      DB_USERNAME: postgres
      DB_SCHEMA: public
      DB_READY_TIMEOUT: 120
      DB_PASSWORD: postgres
      APP_ENV: UAT
      APP_VERSION: 1.0.0
      JAVA_OPTS: "-Xms1024m -Xmx1024m -XX:+UseG1GC -XX:ActiveProcessorCount=8 -Djava.security.egd=file:/dev/./urandom"
      TZ: Asia/Singapore
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 127.0.0.1:8081:8080
    volumes:
      - loginapp-logs:/var/log/loginapp
    networks:
      - uat_net
    restart: unless-stopped
    
volumes:
  postgres-data:
  loginapp-logs:
  
networks:
  uat_net:
    name: uat_net
    driver: bridge
    external: false
